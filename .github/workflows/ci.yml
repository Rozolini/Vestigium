name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust Stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint with Clippy
        run: cargo clippy --workspace --exclude test_target --exclude vestigium_test --all-targets -- -D warnings

      - name: Build workspace
        run: cargo build --workspace --exclude test_target --exclude vestigium_test --verbose

      - name: Run standard tests
        run: cargo test --workspace --exclude test_target --exclude vestigium_test --verbose